// RENDER ERROR STATE
// ═══════════════════════════════════════════════════════════════

function renderIDError(msg){
  var resultEl = document.getElementById('idResultArea');
  if(!resultEl) return;

  var userMsg = msg || 'Unknown error';
  // Make error messages readable for the user
  if(userMsg.indexOf('HTTP 401')!==-1 || userMsg.indexOf('authentication')!==-1){
    userMsg = 'Authentication failed. The app needs to be running inside the Claude.ai interface.';
  } else if(userMsg.indexOf('HTTP 4')!==-1){
    userMsg = 'API request error (' + userMsg.slice(0,80) + '). Check your internet connection.';
  } else if(userMsg.indexOf('HTTP 5')!==-1){
    userMsg = 'Server error — please try again in a moment.';
  } else if(userMsg.indexOf('fetch')!==-1 || userMsg.indexOf('network')!==-1 || userMsg.indexOf('Failed')!==-1){
    userMsg = 'Network connection failed. Make sure you have internet access and try again.';
  } else if(userMsg.indexOf('JSON')!==-1 || userMsg.indexOf('parse')!==-1){
    userMsg = 'The identification response could not be read. Please try again with a clearer photo.';
  }

  resultEl.innerHTML = `
    <div style="background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);border-left:3px solid var(--err);border-radius:0 var(--r) var(--r) 0;padding:.875rem .875rem .75rem">
      <div style="font-size:13px;font-weight:600;color:var(--err);margin-bottom:5px">Identification failed</div>
      <div style="font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:.75rem">${userMsg}</div>
      <div class="id-section-lbl" style="margin-bottom:4px">Troubleshooting</div>
      <div class="id-detail-row"><span class="bullet">·</span>Use a well-lit, sharp, in-focus photo</div>
      <div class="id-detail-row"><span class="bullet">·</span>Make sure the subject fills most of the frame</div>
      <div class="id-detail-row"><span class="bullet">·</span>Try selecting the correct subject type (Plant, Mushroom, etc.)</div>
      <div class="id-detail-row"><span class="bullet">·</span>Check your internet connection</div>
    </div>
    <button onclick="clearIDSession()" style="width:100%;margin-top:.625rem;padding:11px;background:var(--unsel);color:var(--text2);border:1px solid var(--border);border-radius:var(--r-sm);font-size:13px;cursor:pointer;font-family:inherit">
      📷 Try another photo
    </button>`;
}

// FALLING FRUIT BULK IMPORT
// Fetches all community foraging spots for Northern California
// via the Cedar proxy (/ff route) and saves them to My Spots.
// Deduplicates by proximity so re-importing is safe.
// ═══════════════════════════════════════════════════════════════

window.importFFSpots = async function(){
  var btn = document.getElementById('ffImportBtn');
  if(btn){ btn.textContent = '⏳ Importing…'; btn.disabled = true; }

  // NorCal Bay Area covered in a 3×3 grid of bounding boxes
  // Each tile is ~1° × 1° (~100km) — FF API returns up to 200 per call
  var tiles = [
    // [south, west, north, east]
    [37.0, -122.8, 37.7, -122.0],   // San Francisco / Marin / Peninsula
    [37.7, -122.8, 38.4, -122.0],   // North Bay / Sonoma coast
    [37.0, -122.0, 37.7, -121.3],   // East Bay / Santa Cruz mountains
    [37.7, -122.0, 38.4, -121.3],   // Napa / Contra Costa / Solano
    [38.4, -123.2, 39.0, -122.4],   // Mendocino / Lake County
    [37.0, -121.3, 37.7, -120.6],   // South Bay / Diablo foothills
  ];

  var allLocs = [];
  var errors  = 0;

  for(var i = 0; i < tiles.length; i++){
    var t = tiles[i];
    try {
      var url = '/ff?bounds=' + t[0] + ',' + t[1] + ',' + t[2] + ',' + t[3] + '&limit=200';
      var resp = await fetch(url);
      if(!resp.ok) throw new Error('HTTP ' + resp.status);
      var data = await resp.json();
      if(data.error) throw new Error(data.error);
      var locs = Array.isArray(data) ? data : (data.locations || []);
      allLocs = allLocs.concat(locs);
    } catch(e) {
      errors++;
      console.warn('FF tile ' + i + ' failed:', e.message);
    }
    // Small delay between tiles to be respectful to FF servers
    await new Promise(function(r){ setTimeout(r, 300); });
  }

  if(allLocs.length === 0){
    if(btn){ btn.textContent = '⬇ Import FF'; btn.disabled = false; }
    mapToast('Could not reach Falling Fruit — check connection');
    return;
  }

  // Deduplicate against existing pins by lat/lng proximity (~50m)
  var existing = loadPins();
  var newPins  = [];
  var skipped  = 0;

  allLocs.forEach(function(loc){
    var lat = parseFloat(loc.lat);
    var lng = parseFloat(loc.lng);
    if(!lat || !lng) return;

    // Check proximity to existing pins
    var isDupe = existing.concat(newPins).some(function(p){
      var dlat = (p.lat - lat) * 111000;
      var dlng = (p.lng - lng) * 111000 * Math.cos(lat * Math.PI/180);
      return Math.sqrt(dlat*dlat + dlng*dlng) < 50;
    });

    if(isDupe){ skipped++; return; }

    // Map FF type to Cedar category
    var typeName = (loc.type_names && loc.type_names[0]) || (loc.name) || 'Edible plant';
    var cat = mapFFCategory(typeName);
    var name = loc.name || typeName;

    newPins.push({
      id:      'ff_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
      name:    name,
      sci:     '',
      cat:     cat,
      lat:     lat,
      lng:     lng,
      notes:   [
        loc.description ? loc.description.slice(0,200) : '',
        loc.access ? 'Access: ' + loc.access : '',
        'Types: ' + (loc.type_names || [typeName]).join(', ')
      ].filter(Boolean).join(' · '),
      public:  true,
      quality: 0,
      photos:  [],
      date:    new Date().toLocaleDateString('en-US',{month:'short',year:'numeric'}),
      harvests:[],
      fromFF:  true,
      ffTypes: loc.type_names || [typeName]
    });
  });

  // Save all new pins
  var combined = existing.concat(newPins);
  savePins(combined);
  renderMyMarkers();
  renderListView();

  if(btn){ btn.textContent = '⬇ Import FF'; btn.disabled = false; }

  var msg = newPins.length + ' spots imported';
  if(skipped > 0) msg += ' · ' + skipped + ' duplicates skipped';
  if(errors > 0)  msg += ' · ' + errors + ' tiles failed';
  mapToast(msg + ' ✓');
};

// Map Falling Fruit type names to Cedar categories
function mapFFCategory(typeName){
  var t = (typeName || '').toLowerCase();
  if(/mushroom|fungi|chanterelle|boletus|oyster|morel/.test(t))   return 'mushrooms';
  if(/berry|berries|blackberry|blueberry|huckle|elder|goose/.test(t)) return 'berries';
  if(/apple|pear|plum|cherry|fig|persimmon|quince|apricot|peach/.test(t)) return 'fruits';
  if(/walnut|acorn|hazelnut|chestnut|almond|pine.nut/.test(t))    return 'nuts';
  if(/miner|mallow|sorrel|dock|nettle|mustard|clover|dandelion|lettuce|green/.test(t)) return 'greens';
  if(/seaweed|kelp|dulse|nori|sea|limpet|mussel|oyster|clam|crab/.test(t)) return 'coastal';
  return 'other';
}
